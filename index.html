<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imran Rauf | Project Command</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f7ff;
            --bg-body: #050a0f;
            --surface: rgba(16, 25, 35, 0.9);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); display: flex; min-height: 100vh; }

        /* Sidebar - Fixed width for desktop */
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .main-wrapper { flex: 1; padding: 2rem; width: 100%; max-width: 1400px; margin: 0 auto; }

        /* FIXED BENTO GRID - Controlled Columns */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            grid-auto-flow: dense;
        }

        .bento-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            position: relative;
            transition: 0.3s;
        }

        .col-span-2 { grid-column: span 2; }
        
        @media (max-width: 900px) {
            .col-span-2 { grid-column: span 1; }
            .sidebar { display: none; }
        }

        /* Upload Area Styling */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 15px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.02);
        }

        .upload-zone:hover { border-color: var(--primary); background: rgba(0, 247, 255, 0.05); }

        #file-input { display: none; }

        .project-card {
            background: var(--surface);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .project-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #1a202c;
        }

        .project-info { padding: 1rem; }

        .stat-val { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
        .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div style="color: var(--primary); font-family: 'Fira Code'; margin-bottom: 3rem; font-size: 1.2rem; display: flex; align-items: center; gap: 10px;">
            <i data-lucide="layout"></i> DASH.AI
        </div>
        <nav>
            <div style="color: var(--text-muted); margin-bottom: 10px; font-size: 0.8rem;">MENU</div>
            <a href="#" style="display: flex; gap: 12px; color: var(--primary); text-decoration: none; margin-bottom: 15px;"><i data-lucide="home"></i> Overview</a>
            <a href="#" style="display: flex; gap: 12px; color: var(--text-muted); text-decoration: none; margin-bottom: 15px;"><i data-lucide="layers"></i> Projects</a>
        </nav>
    </aside>

    <main class="main-wrapper">
        <header style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
            <h1>Executive Dashboard</h1>
            <div style="background: var(--surface); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; border: 1px solid var(--border);">
                System Status: <span style="color: #4ade80;">Online</span>
            </div>
        </header>

        <div class="upload-zone" onclick="document.getElementById('file-input').click()">
            <i data-lucide="upload-cloud" style="width: 40px; height: 40px; color: var(--primary); margin-bottom: 10px;"></i>
            <p>Click to Upload Project Poster</p>
            <span style="font-size: 0.8rem; color: var(--text-muted);">Format: JPG, PNG • Max: 5MB</span>
            <input type="file" id="file-input" accept="image/*">
        </div>

        <div class="dashboard-grid" id="project-container">
            <div class="bento-item">
                <span class="label">Total Projects</span>
                <div class="stat-val" id="project-count">2</div>
            </div>

            <div class="bento-item col-span-2">
                <span class="label">Weekly Productivity</span>
                <canvas id="miniChart" height="80"></canvas>
            </div>

            <div class="project-card">
                <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&q=80&w=400" class="project-img">
                <div class="project-info">
                    <h4 style="color: var(--primary);">Neon Genesis</h4>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">AI Concept Art Collection</p>
                </div>
            </div>

            <div class="project-card">
                <img src="https://images.unsplash.com/photo-1536240478700-b869070f9279?auto=format&fit=crop&q=80&w=400" class="project-img">
                <div class="project-info">
                    <h4 style="color: var(--primary);">Cyber-Director</h4>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">Automated Film Rig</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // Chart Setup
        const ctx = document.getElementById('miniChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['M', 'T', 'W', 'T', 'F', 'S', 'S'],
                datasets: [{
                    data: [12, 19, 15, 25, 22, 30, 20],
                    borderColor: '#00f7ff',
                    tension: 0.4,
                    fill: false,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { x: { display: false }, y: { display: false } }
            }
        });

        // IMAGE UPLOAD FUNCTIONALITY
        const fileInput = document.getElementById('file-input');
        const container = document.getElementById('project-container');
        const countDisplay = document.getElementById('project-count');
        let count = 2;

        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const newProject = document.createElement('div');
                    newProject.className = 'project-card';
                    newProject.innerHTML = `
                        <img src="${e.target.result}" class="project-img">
                        <div class="project-info">
                            <h4 style="color: var(--primary);">New Venture</h4>
                            <p style="font-size: 0.8rem; color: var(--text-muted);">Recently Uploaded Project</p>
                        </div>
                    `;
                    container.appendChild(newProject);
                    count++;
                    countDisplay.innerText = count;
                }
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
